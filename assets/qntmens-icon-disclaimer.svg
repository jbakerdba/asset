<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101d"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>

    <radialGradient id="glow" cx="35%" cy="30%" r="80%">
      <stop offset="0" stop-color="#94a3b8" stop-opacity="0.16"/>
      <stop offset="0.6" stop-color="#475569" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.35" stop-color="#cbd5e1"/>
      <stop offset="0.65" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#daa520"/>
      <stop offset="0.5" stop-color="#b8860b"/>
      <stop offset="1" stop-color="#8b4513"/>
    </linearGradient>

    <!-- Gold 3D effect filter (shadow + subtle blur) -->
    <filter id="gold-3d" x="-50%" y="-50%" width="200%" height="200%">
      <!-- deep drop shadow -->
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.48"/>
      <!-- tiny blur to soften edges -->
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="infinity-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>

    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.50"/>
    </filter>
    
    <filter id="glow-effect" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="inner" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="1" k3="-1" result="innerShadow"/>
    </filter>

    <!-- Strong text shadow (soft, offset) for 3D base -->
    <filter id="text-shadow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="10" result="off"/>
      <feMerge>
        <feMergeNode in="off"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bevel/specular lighting for text to simulate metallic highlight -->
    <filter id="text-bevel" x="-30%" y="-30%" width="160%" height="160%">
      <!-- create a height map from the alpha -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="bump"/>
      <!-- light source and specular highlight -->
      <!-- NOTE: feSpecularLighting is unsupported in some viewers (VSCode).
           We'll keep the filter but add a viewer-friendly fallback with
           a gold-face gradient and a small blur shadow used directly on the text. -->
      <feSpecularLighting in="bump" surfaceScale="2" specularConstant="0.9" specularExponent="25" lighting-color="#ffffff" result="spec">
        <fePointLight x="-200" y="-200" z="600"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceGraphic" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <!-- Viewer-friendly gold face gradient for text (top bright to bottom warm) -->
    <linearGradient id="gold-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#fff9d6"/>
      <stop offset="0.5" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#b57a12"/>
    </linearGradient>

    <!-- Gradient for extrusion depth (darker at bottom) -->
    <linearGradient id="extrusion-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a2a00"/>
      <stop offset="1" stop-color="#1a0a00"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <rect x="20" y="20" width="984" height="984" rx="190" fill="url(#glow)"/>

  <!-- Outer ring -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="480" r="280" fill="#0b1220"/>
    <circle cx="512" cy="480" r="260" fill="url(#brand)" opacity="0.12"/>
    <circle cx="512" cy="480" r="240" fill="#0b1220"/>
  </g>

  <!-- INFINITY SYMBOL ∞ (Center) -->
  <g opacity="0.5">
    <!-- background shadow stroke (offset) to simulate depth -->
    <path
      d="M512 420 
         C460 420 420 450 400 480 
         C380 510 350 540 300 540 
         C240 540 200 500 200 460 
         C200 420 240 380 300 380 
         C350 380 380 410 400 440 
         C420 470 460 500 512 500
         C564 500 604 470 624 440 
         C644 410 674 380 724 380 
         C784 380 824 420 824 460 
         C824 500 784 540 724 540 
         C674 540 644 510 624 480 
         C604 450 564 420 512 420Z"
      fill="none"
      stroke="#3b2a00"
      stroke-width="44"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.62"
      transform="translate(0,8)"
    />

    <!-- main gold stroke with 3D filter -->
    <path
      d="M512 420 
         C460 420 420 450 400 480 
         C380 510 350 540 300 540 
         C240 540 200 500 200 460 
         C200 420 240 380 300 380 
         C350 380 380 410 400 440 
         C420 470 460 500 512 500
         C564 500 604 470 624 440 
         C644 410 674 380 724 380 
         C784 380 824 420 824 460 
         C824 500 784 540 724 540 
         C674 540 644 510 624 480 
         C604 450 564 420 512 420Z"
      fill="none"
      stroke="url(#gold)"
      stroke-width="30"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#gold-3d)"
    />

    <!-- thin highlight for bevel -->
    <path
      d="M512 420 
         C460 420 420 450 400 480 
         C380 510 350 540 300 540 
         C240 540 200 500 200 460 
         C200 420 240 380 300 380 
         C350 380 380 410 400 440 
         C420 470 460 500 512 500
         C564 500 604 470 624 440 
         C644 410 674 380 724 380 
         C784 380 824 420 824 460 
         C824 500 784 540 724 540 
         C674 540 644 510 624 480 
         C604 450 564 420 512 420Z"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.30"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
      vector-effect="non-scaling-stroke"
      pointer-events="none"
    />
  </g>

  <!-- Q Letter overlay (subtle) -->
  <g opacity="0.3" filter="url(#shadow)">
    <path fill="url(#metal)" d="M512 280c-110 0-200 90-200 200s90 200 200 200c34 0 66-8 94-24l48 50c12 12 32 12 44 0s12-32 0-44l-42-44c28-36 44-80 44-130 0-110-90-200-200-200Zm0 64c74 0 136 62 136 136s-62 136-136 136-136-62-136-136 62-136 136-136Z"/>
  </g>

  <!-- QNTMENS™ text (top) -->
  <g font-family="Segoe UI, Arial Black, system-ui" font-weight="900" text-anchor="middle">
    <!-- shadow for 3D effect -->
    <text x="512" y="158" font-size="50" fill="#000000" opacity="0.25" letter-spacing="2">QNTMENS</text>
    <text x="512" y="155" font-size="50" fill="url(#gold)" stroke="#000000" stroke-width="0.5" letter-spacing="2">QNTMENS</text>
    <!-- Trademark ™ -->
    <text x="780" y="125" font-size="24" fill="url(#gold)">™</text>
  </g>

  <!-- Official Disclaimer text (bottom) -->
  <g font-family="Segoe UI, Arial, system-ui" font-weight="700" text-anchor="middle">
    <!-- shadow for readability -->
    <text x="512" y="806" font-size="44" fill="#000000" opacity="0.40" letter-spacing="4">Official Disclaimer</text>
    <text x="512" y="800" font-size="44" fill="url(#gold)" stroke="#5a3a08" stroke-width="0.8" filter="url(#gold-3d)" letter-spacing="4">Official Disclaimer</text>
  </g>

  <!-- Infinity tagline -->
  <g font-family="Segoe UI, Arial, system-ui" font-weight="400" text-anchor="middle">
    <text x="512" y="860" font-size="28" fill="#94a3b8" font-style="italic">∞ Infinite Possibilities ∞</text>
  </g>

  <!-- Copyright © -->
  <g font-family="Segoe UI, Arial, system-ui" font-weight="400" text-anchor="middle">
    <text x="512" y="940" font-size="24" fill="#475569">© 2026 QNTMENS Ministry. All Rights Reserved.</text>
  </g>

  <!-- Registered trademark notice -->
  <g font-family="Segoe UI, Arial, system-ui" font-weight="400" text-anchor="middle">
    <text x="512" y="980" font-size="18" fill="#334155">QNTMENS® is a registered trademark</text>
  </g>
</svg>