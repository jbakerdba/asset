<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QNTMENS™ - Benevolence</title>
    
    <!-- Favicon - Infinity Symbol -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23020617'/><path d='M50 40 C40 40 32 46 28 50 C24 54 18 58 12 58 C6 58 2 54 2 50 C2 46 6 42 12 42 C18 42 24 46 28 50 C32 54 40 58 50 58 C60 58 68 54 72 50 C76 46 82 42 88 42 C94 42 98 46 98 50 C98 54 94 58 88 58 C82 58 76 54 72 50 C68 46 60 40 50 40Z' fill='none' stroke='%2360a5fa' stroke-width='6'/></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #020617 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f1f5f9;
        }
        
        .logo-container {
            text-align: center;
            padding: 40px;
        }
        
        .logo-svg {
            width: 300px;
            height: 300px;
            margin-bottom: 30px;
            filter: drop-shadow(0 20px 40px rgba(96, 165, 250, 0.3));
        }
        
        .brand-name {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 50%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .trademark {
            color: #ffd700;
            font-size: 24px;
            vertical-align: super;
        }
        
        .tagline {
            font-size: 24px;
            color: #64748b;
            letter-spacing: 6px;
            margin-bottom: 20px;
        }
        
        .infinity-tagline {
            font-size: 20px;
            color: #94a3b8;
            font-style: italic;
            margin-bottom: 40px;
        }
        
        .infinity-symbol {
            font-size: 120px;
            background: linear-gradient(90deg, #60a5fa 0%, #a78bfa 50%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(96, 165, 250, 0.5));
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        
        .copyright {
            font-size: 14px;
            color: #475569;
            margin-top: 40px;
        }
        
        .registered {
            font-size: 12px;
            color: #334155;
            margin-top: 10px;
        }
        
        .divider {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #64748b, transparent);
            margin: 30px auto;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <!-- Infinity Symbol -->
        <div class="infinity-symbol">∞</div>
        
        <!-- Brand Name -->
        <h1 class="brand-name">QNTMENS<span class="trademark">™</span></h1>
        
        <!-- Tagline -->
        <p class="tagline">BENEVOLENCE</p>
        
        <div class="divider"></div>
        
        <!-- Infinity Tagline -->
        <p class="infinity-tagline">∞ Infinite Possibilities ∞</p>
        
        <!-- Copyright -->
        <p class="copyright">© 2026 QNTMENS Ministry. All Rights Reserved.</p>
        <p class="registered">QNTMENS® is a registered trademark</p>
    </div>
</body>
</html>
